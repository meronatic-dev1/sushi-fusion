# Nixpacks config for Sushi Fusion Frontend (Next.js)
# Coolify: set Base Directory to "frontend"

# Let Coolify control Node version via NIXPACKS_NODE_VERSION env var (defaults to 22)

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build", "cp -r public .next/standalone/public", "cp -r .next/static .next/standalone/.next/static"]

[start]
cmd = "node .next/standalone/server.js"
