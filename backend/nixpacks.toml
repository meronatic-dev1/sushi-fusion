# Nixpacks config for Sushi Fusion Backend (NestJS + Prisma)
# Coolify: set Base Directory to "backend"

# Use a nixpkgs archive that includes Node 22.14.0 (Prisma 7.4 requires 22.12+)
[phases.setup]
nixpkgsArchive = "e6f23dc08d3624daab7094b701aa3954923c6bbb"
nixPkgs = ["nodejs_22", "npm-9_x"]

# Force NODE_ENV=development so devDependencies (@nestjs/cli, typescript) get installed
[phases.install]
cmds = ["NODE_ENV=development npm install"]

[phases.build]
cmds = [
    "npx prisma generate",
    "NODE_ENV=development npm run build",
    "ls -la dist/main.js || echo 'ERROR: dist/main.js was NOT created!'"
]

[start]
cmd = "npx prisma db push && node dist/main"
