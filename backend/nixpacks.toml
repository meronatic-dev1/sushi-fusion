# Nixpacks config for Sushi Fusion Backend (NestJS + Prisma)
# Coolify: set Base Directory to "backend"

# Let Coolify control Node version via NIXPACKS_NODE_VERSION env var (defaults to 22)
# Do NOT override [phases.setup] — that would conflict with the env var

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
    "npx prisma generate",
    "npm run build"
]

[start]
cmd = "npx prisma db push --skip-generate && npm run start:prod"
